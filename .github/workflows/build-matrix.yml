name: Build (multi-OS)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Setup build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 make g++ clang-format

      - name: Setup build tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install python@3 || true
          brew install llvm || true

      - name: Setup build tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # npm's bundled node-gyp (resolved by node-gyp-build) must be >= 12.1.0
        # to detect Visual Studio 2026 (v18) on the windows-2025-vs2026 runner.
        # npm >= 11.6.3 bundles node-gyp >= 12.1.0.
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build (node-gyp + tsc)
        run: npm run build

      - name: Show built artifact
        run: |
          node -e "console.log('exists:', require('fs').existsSync('build/Release/seshat.node'))"


